###############################################################################
# tmux Configuration
#
# DESCRIPTION
#   Configuration file for tmux.
#
#   tmux (short for terminal multiplexer) is a command-line tool that lets you
#   run, manage, and switch between multiple terminal sessions within a single
#   window.
#
#   See: https://github.com/tmux/tmux
#
# INSTALLATION
#   Symlink file to $XDG_CONFIG_HOME/tmux/tmux.conf:
#
#     ln -s .config/tmux/tmux.conf $XDG_CONFIG_HOME/tmux/tmux.conf
###############################################################################

###############################################################################
# Basic Configuration
###############################################################################

# Specify the default shell.
set-option -g default-shell $SHELL

# Set the maximum number of lines held in window history.
set-option -g history-limit 100000

# If on, tmux captures the mouse and allows mouse events to be bound as key
# bindings.
set-option -g mouse on

# Set the time in milliseconds for which tmux waits after an escape is input to
# determine if it is part of a function or meta key sequences.
set-option -s escape-time 0

# Use vi-style key bindings in copy mode.
set-window-option -g mode-keys vi

# Auto-renumber windows after one is closed.
set-option -g renumber-windows on

# Bind Ctrl + t to toggle a popup.
bind -n C-t if-shell -F '#{==:#{session_name},popup}' { detach-client } { display-popup -E -S 'fg=#7c6f64' -w 40% -h 40% "tmux new-session -A -s popup" }

###############################################################################
# Remap Configuration
###############################################################################

# Remap prefix to CTRL + a.
set-option -g prefix C-a
unbind C-b

# Vim style pane split (:split and :vsplit).
bind-key s split-window -v
bind-key v split-window -h

# Vim style pane selection.
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Vim style pane resize.
bind-key H resize-pane -L 10
bind-key J resize-pane -D 10
bind-key K resize-pane -U 10
bind-key L resize-pane -R 10

# Shift the current window one slot left/right. `-r` makes them repeatable so
# you can hold prefix and tap; `-d` keeps focus on the moved window.
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1

# Yank to the system clipboard in copy mode.
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"

###############################################################################
# Powerline Configuration
###############################################################################

# Run powerline-daemon.
run-shell "powerline-daemon -q"

# The following is taken from the Arch Linux Wiki:
#
#   Add the following to your tmux.conf:
#
#     ~/.config/tmux/tmux.conf
#
#     ```
#     source /usr/share/powerline/bindings/tmux/powerline.conf
#     ```
#
#   Note: It is sufficient to just add this to the tmux configuration: adding
#   anything to your shell configuration is not necessary.
#
# Source: https://wiki.archlinux.org/index.php/Powerline
#
# The original powerline.conf file is located in the installation location of
# Powerline:
#
#   powerline/bindings/tmux/powerline.conf
#
# In order to make the installation and configuration of Powerline portable,
# this file is replicated here and symlinked to $XDG_CONFIG_HOME.
source "${XDG_CONFIG_HOME}/powerline/bindings/tmux/powerline.conf"

# Prepend the per-window @claude_status marker to Powerline's window-status
# formats. The marker is set by ~/.claude/hooks/tmux-status.sh in response to
# Claude Code hook events (working, input, idle).
run-shell 'fmt=$(tmux show-window-options -gv window-status-format); tmux set-window-option -g window-status-format "##{?##{@claude_status},##{@claude_status} ,}$fmt"'
run-shell 'cfmt=$(tmux show-window-options -gv window-status-current-format); tmux set-window-option -g window-status-current-format "##{?##{@claude_status},##{@claude_status} ,}$cfmt"'

# When a pane closes, its per-pane @claude_pane_status is destroyed with it.
# Re-roll the window marker so the visible status reflects only live panes.
set-hook -g pane-exited 'run-shell "~/.claude/hooks/tmux-status.sh rollup #{hook_window}"'

###############################################################################
# Vitality
###############################################################################

# When enabled, focus events are requested from the terminal if supported and
# passed through to applications running in tmux.
set-option -g focus-events on

###############################################################################
# UI
###############################################################################

# Set pane border color.
set-option -g pane-border-style bg=default,fg=#7c6f64
set-option -g pane-active-border-style bg=default,fg=#83a598

# Set command color.
set-option -g message-style bg=default,fg=default
set-option -g message-command-style bg=default,fg=default

# Disable visual alerts for activity and silence notifications.
set-option -g visual-activity off
set-option -g visual-silence off
set-window-option -g monitor-activity off
set-window-option -g monitor-silence 0

# Disable terminal bells.
set-option -g bell-action none

###############################################################################
# Status
###############################################################################

# Set status length.
set-option -g status-left-length 50
set-option -g status-right-length 150

# Set status color.
set-option -g status-style fg=default,bg=default

# Set default terminal.
set-option -g default-terminal $TERM
set-option -g terminal-overrides 'xterm*:Tc'

###############################################################################
# URL Picker
###############################################################################

# Open URLs from the current pane using fzf.
bind-key u capture-pane -J -S - \; \
  save-buffer /tmp/tmux-buffer \; \
  delete-buffer \; \
  display-popup -E -S 'fg=#7c6f64' -w 50% -h 15% "\
    grep -oE 'https?://[^ ]+' /tmp/tmux-buffer \
    | sed -E 's/[].,;:!?)}>\"]+\$//' \
    | sort -u \
    | fzf --multi \
      --bind 'ctrl-y:execute-silent(echo -n {} | pbcopy)+abort' \
      --color header:italic \
      --header 'Press Ctrl-y to copy URL to clipboard.' \
    | xargs open"

###############################################################################
# Reload
###############################################################################

# Reload tmux config.
unbind r
bind r source-file "${XDG_CONFIG_HOME}/tmux/tmux.conf"

###############################################################################
# Plugins
###############################################################################

# Managed by TPM (Tmux Plugin Manager). prefix + I installs plugins,
# prefix + U updates them.
set-environment -g TMUX_PLUGIN_MANAGER_PATH "${XDG_CONFIG_HOME}/tmux/plugins"

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore vim/nvim sessions and the shell command line each pane was running.
set -g @resurrect-strategy-vim 'session'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-capture-pane-contents 'on'

# Auto-save every 15 minutes and auto-restore the last save on tmux start.
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# Bootstrap TPM on first run if missing, then install declared plugins.
if "test ! -d ${XDG_CONFIG_HOME}/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ${XDG_CONFIG_HOME}/tmux/plugins/tpm && ${XDG_CONFIG_HOME}/tmux/plugins/tpm/bin/install_plugins'"

# Initialize TPM. Must be the last line in this file.
run "${XDG_CONFIG_HOME}/tmux/plugins/tpm/tpm"
