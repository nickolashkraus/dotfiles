###############################################################################
# Codex Configuration
#
# DESCRIPTION
#   Configuration file for Codex, OpenAI's agentic coding assistant.
#
#   See: https://github.com/openai/codex
#
# INSTALLATION
#   Symlink file to $HOME/.codex/config.toml:
#
#     ln -s .codex/config.toml $HOME/.codex/config.toml
###############################################################################

model = "gpt-5.5"
approval_policy = "never"
sandbox_mode = "danger-full-access"
model_reasoning_effort = "xhigh"
project_doc_max_bytes = 65536

[notice]
  hide_gpt5_1_migration_prompt = true
  "hide_gpt-5.1-codex-max_migration_prompt" = true

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[features]
  apps = true
  hooks = true
  multi_agent = true
  shell_snapshot = true
  unified_exec = true

[hooks.state."/Users/nickolas/.codex/hooks.json:stop:0:0"]
  trusted_hash = "sha256:b650575c0164863cd30ba1704fa406169aa44888ff8f2b7108d8f43f51cb0720"

[projects."/"]
  trust_level = "trusted"

[projects."/Users/nickolas"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/terminal"]
  trust_level = "trusted"

[projects."/Users/nickolas/grind-rip"]
  trust_level = "trusted"

[projects."/Users/nickolas/Function-Health/auth0-acul"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/dotfiles/master"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/dotfiles/codex-claude-harness"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/dotfiles"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/agent-os/master"]
  trust_level = "trusted"

[projects."/Users/nickolas/nickolashkraus/agent-os"]
  trust_level = "trusted"

[tui]
  theme = "base16"
  vim_mode_default = true

[tui.model_availability_nux]
"gpt-5.5" = 4

[plugins."github@openai-curated"]
enabled = true
