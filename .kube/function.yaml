###############################################################################
# Function Health kubeconfig File
#
# DESCRIPTION
#   Use kubeconfig files to organize information about clusters, users,
#   namespaces, and authentication mechanisms. The kubectl command-line tool
#   uses kubeconfig files to find the information it needs to choose a cluster
#   and communicate with the API server of a cluster. See:
#   https://kubernetes.io/docs/concepts/configuration/organize-cluster-access-kubeconfig/
#
#   /!\ WARNING /!\
#   File generated by `gcloud container clusters get-credentials`. DO NOT EDIT.
#
#     ```
#     $ KUBECONFIG=$HOME/.kube/function.yaml \
#         gcloud container clusters get-credentials <cluster> \
#         --region=<region> --project=<project>
#     ```
#
#   Function Health has GKE clusters in the following GCP projects:
#     * function-health-dev-env
#         └── us-central1
#             └── gke-cluster-common-dev
#     * function-health-prod-env
#         └── us-central1
#             ├── autopilot-pro-admin-app-cluster-1
#             └── gke-cluster-common-prod
#     * function-health-sandbox-env
#         └── us-central1
#             └── gke-cluster-common-sandbox
#
#   Access to these clusters is gated by ConductorOne entitlements
#   ("Kubernetes Engine Admin" on the corresponding GCP project). Request
#   short-lived access via `cone get`.
#
# INSTALLATION
#   Symlink file to $HOME/.kube/function.yaml:
#
#     ln -s .kube/function.yaml $HOME/.kube/function.yaml
###############################################################################

apiVersion: v1
clusters:
  - cluster:
      certificate-authority-data:
      server:
    name:
contexts:
  - context:
      cluster:
      user:
    name:
current-context:
kind: Config
preferences: {}
users:
  - name: gke_function-health-prod-env_us-central1_gke-cluster-common-prod
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1beta1
        command: gke-gcloud-auth-plugin
        installHint:
          Install gke-gcloud-auth-plugin for use with kubectl by following
          https://cloud.google.com/kubernetes-engine/docs/how-to/cluster-access-for-kubectl#install_plugin
        provideClusterInfo: true
  - name: gke_function-health-dev-env_us-central1_gke-cluster-common-dev
    user:
      exec:
        apiVersion: client.authentication.k8s.io/v1beta1
        command: gke-gcloud-auth-plugin
        installHint:
          Install gke-gcloud-auth-plugin for use with kubectl by following
          https://cloud.google.com/kubernetes-engine/docs/how-to/cluster-access-for-kubectl#install_plugin
        provideClusterInfo: true
